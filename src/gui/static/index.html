<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>codex-router</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body {
        margin: 0;
        background: #0f1115;
        color: #f5f7fa;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1 {
        margin-bottom: 8px;
      }

      p {
        color: #b3bcc8;
      }

      button {
        cursor: pointer;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        background: #2b6ef2;
        color: white;
        font-weight: 600;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 24px;
        background: #171a21;
        border-radius: 16px;
        overflow: hidden;
      }

      th,
      td {
        padding: 14px 16px;
        text-align: left;
        border-bottom: 1px solid #242936;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }

      .pill {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 999px;
        background: #20314f;
        color: #90b4ff;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>codex-router</h1>
      <p>Live 5-hour and weekly Codex limits across your tagged accounts.</p>

      <div class="toolbar">
        <button id="refresh">Refresh status</button>
        <button id="launch">Launch Codex</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Active</th>
            <th>Tag</th>
            <th>5h Used</th>
            <th>Weekly Used</th>
            <th>Reset In</th>
            <th>Auth</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </main>

    <script type="module">
      const rows = document.querySelector("#rows");

      function formatPercent(value) {
        return value === undefined ? "unknown" : `${value}%`;
      }

      async function refresh() {
        const response = await fetch("/api/status");
        const statuses = await response.json();

        rows.innerHTML = "";
        for (const status of statuses) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${status.active ? '<span class="pill">active</span>' : ""}</td>
            <td>${status.tag}</td>
            <td>${formatPercent(status.snapshot?.fiveHourUsedPct)}</td>
            <td>${formatPercent(status.snapshot?.weeklyUsedPct)}</td>
            <td>${status.snapshot?.resetIn ?? "unknown"}</td>
            <td>${status.authState}</td>
            <td><button data-tag="${status.tag}">Switch</button></td>
          `;
          rows.appendChild(tr);
        }
      }

      rows.addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) {
          return;
        }

        const tag = target.dataset.tag;
        if (!tag) {
          return;
        }

        await fetch("/api/switch", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ tag }),
        });
        await refresh();
      });

      document.querySelector("#refresh").addEventListener("click", refresh);
      document.querySelector("#launch").addEventListener("click", async () => {
        await fetch("/api/launch", { method: "POST" });
      });

      await refresh();
    </script>
  </body>
</html>
